name: CI

on:
  push:
    branches: [master, main]
  pull_request:

# These jobs mirror `pyclawd check` (format-check -> lint -> typecheck -> test):
# the same tools (ruff check, ruff format --check, mypy, pytest) run here and
# locally, so a green `pyclawd check` predicts a green CI. The lint/typecheck jobs
# call the tools directly and do NOT depend on pyclawd. The test job installs
# pyclawd so its golden pytest plugin activates and compares the behavior
# baselines in tests/golden/ (bare pytest runs every marker, including golden).
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Ruff lint
        run: uvx ruff check .
      - name: Ruff format check
        run: uvx ruff format --check .

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip mypy
      - run: python -m pip install -e .
      - name: Mypy
        run: mypy src

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install --upgrade pip pytest pyclawd
      - run: python -m pip install -e .
      - name: Pytest (incl. golden behavior baselines)
        run: pytest
